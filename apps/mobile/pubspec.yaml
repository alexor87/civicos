name: civicos_mobile
description: CivicOS — Campaign Management Platform (Mobile)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase ────────────────────────────────────────────────────────────────
  supabase_flutter: ^2.8.1

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^14.6.3

  # ── State management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Local database (offline) ─────────────────────────────────────────────
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0

  # ── Secure storage ───────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Biometrics ──────────────────────────────────────────────────────────
  local_auth: ^2.3.0

  # ── Maps (OpenStreetMap, 100% free) ──────────────────────────────────────
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # ── Push notifications ───────────────────────────────────────────────────
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # ── UI & fonts ───────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # ── Utilities ────────────────────────────────────────────────────────────
  intl: ^0.19.0
  collection: ^1.18.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.23.1
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
